<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行きたい場所マップ</title>

  <!-- Leaflet -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 地図 -->
  <div id="map"></div>

  <!-- 上部検索バー -->
  <div class="top-bar">
    <input id="searchBox" type="text" placeholder="場所名を検索">
    <button id="searchBtn">検索</button>
  </div>

  <!-- 下部ボタン -->
  <div class="bottom-bar">
    <button id="listBtn">一覧</button>
    <button id="locBtn">現在地</button>
    <button id="clearBtn">全削除</button>
  </div>

  <!-- 検索結果パネル -->
  <div id="resultPanel" class="result-panel hidden">
    <div class="result-header">
      <span>検索結果</span>
      <button id="closeResult">閉じる</button>
    </div>
    <div id="resultList"></div>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- アプリ本体 -->
  <script src="script.js"></script>

</body>
</html>
